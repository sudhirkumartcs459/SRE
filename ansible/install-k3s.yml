---
- name: Install K3s Single Node Cluster
  hosts: k3s
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install required dependencies
      apt:
        name:
          - curl
          - wget
          - ca-certificates
        state: present

    - name: Install latest stable K3s
      shell: |
        curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for K3s service to start
      service:
        name: k3s
        state: started
        enabled: yes

    - name: Verify K3s node status
      command: kubectl get nodes
      register: node_status
      changed_when: false

    - name: Display node status
      debug:
        var: node_status.stdout_lines
